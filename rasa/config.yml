version: "3.1"

recipe: default.v1

language: en

pipeline:
- name: WhitespaceTokenizer
- name: RegexFeaturizer
- name: LexicalSyntacticFeaturizer
- name: CountVectorsFeaturizer
- name: CountVectorsFeaturizer
  analyzer: char_wb
  min_ngram: 1
  max_ngram: 4
- name: DIETClassifier
  epochs: 100
- name: EntitySynonymMapper
- name: ResponseSelector
  epochs: 100
- name: FallbackClassifier
  threshold: 0.3

policies:
- name: MemoizationPolicy
  max_history: 5
- name: TEDPolicy
  constrain_similarities: true
  max_history: 5
  epochs: 100
- name: RulePolicy
assistant_id: 20250306-124415-brave-gym
