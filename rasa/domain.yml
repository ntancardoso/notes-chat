version: "3.1"

intents:
  - greet
  - goodbye
  - affirm
  - deny
  - mood_great
  - mood_unhappy
  - bot_challenge
  - ask_question

responses:
  utter_greet:
    - text: "Ahoy! How can I help you today?"

  utter_cheer_up:
  - text: "Here is something to cheer you up:"
    image: "https://i.imgur.com/nGF1K8f.jpg"

  utter_did_that_help:
  - text: "Did that help you?"

  utter_happy:
  - text: "Great, carry on!"

  utter_goodbye:
  - text: "Goodbye! Let me know if you need anything else."

  utter_iamabot:
  - text: "I am a bot, powered by kitties."

actions:
  - action_search_notes

session_config:
  session_expiration_time: 60
  carry_over_slots_to_new_session: true